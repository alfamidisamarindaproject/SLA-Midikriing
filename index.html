<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring SLA Midikriing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Monitoring Pesanan <span class="text-blue-600">Midikriing</span></h1>
                <p class="text-slate-500 mt-1">Daftar pengiriman yang belum selesai secara real-time.</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="last-update" class="text-xs text-slate-400 italic">Terakhir update: -</span>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition shadow-md">
                    <i class="fas fa-sync-alt mr-2"></i> Refresh
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm font-medium">Total Antrean</p>
                <h2 id="stat-total" class="text-2xl font-bold text-slate-900">-</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm font-medium text-orange-600">Status Proses</p>
                <h2 id="stat-proses" class="text-2xl font-bold text-orange-600">-</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm font-medium text-blue-600">Sedang Dikirim</p>
                <h2 id="stat-dikirim" class="text-2xl font-bold text-blue-600">-</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm font-medium text-emerald-600">Total Revenue</p>
                <h2 id="stat-revenue" class="text-2xl font-bold text-emerald-600">-</h2>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="search-input" placeholder="Cari nama penerima atau toko..." 
                       class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <select id="filter-wilayah" class="border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                <option value="">Semua Wilayah</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div id="loading-state" class="hidden p-20 flex flex-col items-center">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-slate-500 font-medium">Memuat data terbaru...</p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 text-sm uppercase">
                            <th class="p-4 font-semibold border-b">Toko / Wilayah</th>
                            <th class="p-4 font-semibold border-b">Penerima</th>
                            <th class="p-4 font-semibold border-b">No. Pengiriman</th>
                            <th class="p-4 font-semibold border-b text-center">Status APO</th>
                            <th class="p-4 font-semibold border-b">Status Shipment</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
