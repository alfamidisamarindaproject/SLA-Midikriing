<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring SLA Midikriing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot-pulse {
            height: 10px; width: 10px; background-color: #22c55e;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black uppercase italic">Monitoring <span class="text-blue-600">Midikriing</span></h1>
                <p id="gsheet-update" class="text-[10px] font-bold text-slate-400 mt-1 uppercase italic">Menghubungkan Database...</p>
            </div>
            <div class="flex items-center gap-3 bg-green-50 px-4 py-2 rounded-full">
                <span class="dot-pulse"></span>
                <span class="text-[10px] font-black uppercase text-green-600 tracking-widest">System Active</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
            <input type="text" id="search-input" placeholder="Cari Nama / Toko..." class="p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <select id="filter-wilayah" class="p-3 rounded-xl border border-slate-200 bg-white text-sm outline-none cursor-pointer"></select>
            <select id="filter-apo" class="p-3 rounded-xl border border-slate-200 bg-white text-sm outline-none cursor-pointer"></select>
            <select id="filter-shipment" class="p-3 rounded-xl border border-slate-200 bg-white text-sm outline-none cursor-pointer"></select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-6 py-4">Toko / Wilayah</th>
                            <th class="px-6 py-4">Penerima</th>
                            <th class="px-6 py-4 text-center">No Pengiriman</th>
                            <th class="px-6 py-4 text-center">Status APO</th>
                            <th class="px-6 py-4">Status Shipment</th>
                            <th class="px-6 py-4 text-center">SLA</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100 text-[11px] italic">
                        <tr><td colspan="6" class="p-20 text-center text-slate-300 font-bold animate-pulse uppercase">Sinkronisasi Data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
