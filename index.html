<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  </style>
</head>
<body class="bg-gray-50 p-4">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-4">
      <h1 class="font-bold text-lg text-blue-800 italic uppercase">Monitoring SLA <span class="text-orange-500">Midikriing</span></h1>
      <div id="status" class="text-[10px] font-bold text-gray-400 uppercase italic">Memuat Data...</div>
    </div>

    <input type="text" id="searchInput" placeholder="Cari Nama atau No Pengiriman..." 
           class="w-full p-3 mb-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">

    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-100 text-[10px] font-bold text-gray-500 uppercase">
              <th class="p-4">Toko / Wilayah</th>
              <th class="p-4">Penerima</th>
              <th class="p-4">No Pengiriman</th>
              <th class="p-4">Status APO</th>
              <th class="p-4">Status Shipment</th>
              <th class="p-4 text-center">SLA</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="text-xs italic divide-y divide-gray-100">
            <tr><td colspan="6" class="p-10 text-center loading-pulse">Menghubungkan ke Google Sheets...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
