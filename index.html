<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring SLA Midikriing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter">MONITORING <span class="text-blue-600">SLA</span></h1>
                <p id="last-update" class="text-xs text-slate-400 font-bold uppercase italic mt-1">Status: Sinkronkan Data...</p>
            </div>
            <button onclick="fetchData()" class="mt-4 md:mt-0 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition active:scale-95">
                <i class="fas fa-sync-alt mr-2"></i> REFRESH DATA
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-slate-400">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Total Pending</p>
                <h2 id="stat-total" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-red-500">
                <p class="text-[10px] font-bold text-red-500 uppercase">NEW</p>
                <h2 id="stat-new" class="text-3xl font-black text-red-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-orange-500">
                <p class="text-[10px] font-bold text-orange-500 uppercase">PROSES</p>
                <h2 id="stat-proses" class="text-3xl font-black text-orange-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-[10px] font-bold text-emerald-500 uppercase">PACKING</p>
                <h2 id="stat-packing" class="text-3xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-blue-600 col-span-2 md:col-span-1">
                <p class="text-[10px] font-bold text-blue-600 uppercase">Revenue</p>
                <h2 id="stat-revenue" class="text-xl font-black text-slate-800">Rp 0</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-slate-200">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <input type="text" id="search-input" placeholder="Cari Nama / Toko..." class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <select id="filter-wilayah" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm"></select>
                <select id="filter-apo" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold"></select>
                <select id="filter-shipment" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm"></select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div id="loading-state" class="hidden py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
                <p class="text-slate-400 font-bold mt-4">MENGAMBIL DATA...</p>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <th class="px-6 py-4 text-center">Toko / Wilayah</th>
                            <th class="px-6 py-4">Penerima</th>
                            <th class="px-6 py-4">No Pengiriman</th>
                            <th class="px-6 py-4 text-center">Status APO</th>
                            <th class="px-6 py-4">Shipment</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
