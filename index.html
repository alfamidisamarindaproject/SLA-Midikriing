<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-custom { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="bg-gradient-custom text-white p-6 mb-6 shadow-lg">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0 text-center md:text-left">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">SLA <span class="text-blue-400">Monitoring</span></h1>
                <div class="flex items-center justify-center md:justify-start mt-1">
                    <span class="flex h-2 w-2 mr-2">
                        <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    <p id="gsheet-update" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        Menghubungkan ke Google Sheets...
                    </p>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-white/10 px-4 py-2 rounded-lg border border-white/10">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Total</p>
                    <p id="stat-total" class="text-xl font-black">0</p>
                </div>
                <div class="bg-red-500/20 px-4 py-2 rounded-lg border border-red-500/30">
                    <p class="text-[9px] text-red-400 font-bold uppercase italic">New</p>
                    <p id="stat-new" class="text-xl font-black text-red-400">0</p>
                </div>
                <div class="bg-blue-500/20 px-4 py-2 rounded-lg border border-blue-500/30">
                    <p class="text-[9px] text-blue-400 font-bold uppercase">Revenue</p>
                    <p id="stat-revenue" class="text-xs font-black mt-1">Rp 0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3.5 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="Cari Nama / No Pengiriman..." 
                    class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition shadow-sm">
            </div>
            <select id="filter-wilayah" class="p-3 rounded-xl border border-slate-200 bg-white text-sm font-semibold shadow-sm"></select>
            <select id="filter-apo" class="p-3 rounded-xl border border-slate-200 bg-white text-sm font-semibold shadow-sm"></select>
            <select id="filter-shipment" class="p-3 rounded-xl border border-slate-200 bg-white text-sm font-semibold shadow-sm"></select>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white">
                        <tr class="text-[10px] uppercase tracking-widest">
                            <th class="px-6 py-4">Toko / Wilayah</th>
                            <th class="px-6 py-4">Penerima</th>
                            <th class="px-6 py-4">No Pengiriman</th>
                            <th class="px-6 py-4 text-center">Status APO</th>
                            <th class="px-6 py-4">Status Shipment</th>
                            <th class="px-6 py-4 text-center">Jadwal Kirim</th>
                            <th class="px-6 py-4 text-center">SLA</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100 italic">
                        </tbody>
                </table>
            </div>
            
            <div id="loading-state" class="py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
                <p class="mt-4 text-slate-500 font-bold text-sm tracking-widest uppercase">Sinkronisasi Server...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
