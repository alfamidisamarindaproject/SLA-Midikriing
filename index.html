<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Monitoring Midikriing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Monitoring Pesanan <span class="text-blue-600">Midikriing</span></h1>
                <p id="last-update" class="text-xs text-slate-500 italic">Memuat...</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition shadow-sm">
                <i class="fas fa-sync-alt mr-2"></i> Sinkron Data
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-semibold uppercase">Total Belum Terkirim</p>
                <h2 id="stat-total" class="text-3xl font-black text-slate-800">-</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-orange-500 text-xs font-semibold uppercase">Dalam Proses / Packing</p>
                <h2 id="stat-proses" class="text-3xl font-black text-orange-500">-</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-emerald-600 text-xs font-semibold uppercase">Potensi Revenue</p>
                <h2 id="stat-revenue" class="text-3xl font-black text-emerald-600">-</h2>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input type="text" id="search-input" placeholder="Cari nama atau nomor..." class="flex-1 p-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
            <select id="filter-wilayah" class="p-2 rounded-lg border border-slate-300 bg-white min-w-[200px]">
                <option value="">Semua Wilayah</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div id="loading-state" class="hidden p-10 text-center font-medium text-slate-500">
                <i class="fas fa-circle-notch animate-spin mr-2"></i> Mengambil data gsheet...
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-xs uppercase tracking-tighter">
                            <th class="p-4 border-b">Toko / Wilayah</th>
                            <th class="p-4 border-b">Penerima</th>
                            <th class="p-4 border-b">No. Pengiriman</th>
                            <th class="p-4 border-b text-center">APO</th>
                            <th class="p-4 border-b">Status Shipment</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
