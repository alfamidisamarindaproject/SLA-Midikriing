<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-slate-800 italic uppercase">Monitoring <span class="text-blue-600">Midikriing</span></h1>
                <p id="gsheet-update" class="text-[10px] text-slate-500 font-bold uppercase italic mt-1">Status: Menghubungkan...</p>
            </div>
            <div id="status-text" class="text-xs font-bold text-slate-400 uppercase italic">Offline</div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-slate-400">
                <p class="text-[9px] font-black text-slate-400 uppercase">Pending</p>
                <h2 id="stat-total" class="text-2xl font-black">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-red-500">
                <div class="flex justify-between items-center"><p class="text-[9px] font-black text-red-500">NEW</p><span id="perc-new" class="text-[10px] font-bold">0%</span></div>
                <h2 id="stat-new" class="text-2xl font-black text-red-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-500">
                <div class="flex justify-between items-center"><p class="text-[9px] font-black text-orange-500">PROSES</p><span id="perc-proses" class="text-[10px] font-bold">0%</span></div>
                <h2 id="stat-proses" class="text-2xl font-black text-orange-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-emerald-500">
                <div class="flex justify-between items-center"><p class="text-[9px] font-black text-emerald-500">PACKING</p><span id="perc-packing" class="text-[10px] font-bold">0%</span></div>
                <h2 id="stat-packing" class="text-2xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-600">
                <p class="text-[9px] font-black text-blue-600 uppercase">Revenue</p>
                <h2 id="stat-revenue" class="text-lg font-black italic">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
            <input type="text" id="search-input" placeholder="Cari Nama/No..." class="p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <select id="filter-wilayah" class="p-2.5 rounded-xl border border-slate-200 bg-white text-sm"></select>
            <select id="filter-apo" class="p-2.5 rounded-xl border border-slate-200 bg-white text-sm"></select>
            <select id="filter-shipment" class="p-2.5 rounded-xl border border-slate-200 bg-white text-sm"></select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-6 py-4">Toko / Wilayah</th>
                            <th class="px-6 py-4">Penerima</th>
                            <th class="px-6 py-4 text-center">No Pengiriman</th>
                            <th class="px-6 py-4 text-center">Status APO</th>
                            <th class="px-6 py-4">Status Shipment</th>
                            <th class="px-6 py-4 text-center">SLA</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100 text-[11px] italic">
                        <tr><td colspan="6" class="p-20 text-center font-bold text-slate-300 animate-pulse">SINKRONISASI DATA...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
