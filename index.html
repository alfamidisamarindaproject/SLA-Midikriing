<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Monitoring Midikriing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-10">
    <div class="container mx-auto px-4 py-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight text-center md:text-left">
                    MONITORING <span class="text-blue-600">MIDIKRIING</span>
                </h1>
                <p id="last-update" class="text-xs text-gray-400 mt-1 font-medium italic text-center md:text-left">Belum Sinkron</p>
            </div>
            <button onclick="fetchData()" class="mt-4 md:mt-0 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-xl transition duration-200 flex items-center shadow-md">
                <i class="fas fa-sync-alt mr-2"></i> REFRESH DATA
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-500">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Total Pending</p>
                <h2 id="stat-total" class="text-2xl font-black text-gray-800">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-red-500">
                <p class="text-[10px] font-bold text-red-400 uppercase tracking-wider">NEW</p>
                <h2 id="stat-new" class="text-2xl font-black text-red-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-500">
                <p class="text-[10px] font-bold text-orange-400 uppercase tracking-wider">PROSES</p>
                <h2 id="stat-proses" class="text-2xl font-black text-orange-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-emerald-500">
                <p class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider">PACKING</p>
                <h2 id="stat-packing" class="text-2xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-purple-500 col-span-2 md:col-span-1">
                <p class="text-[10px] font-bold text-purple-400 uppercase tracking-wider">Revenue</p>
                <h2 id="stat-revenue" class="text-xl font-black text-purple-700">Rp 0</h2>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-100">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <input type="text" id="search-input" placeholder="Cari Nama / No Pengiriman..." class="p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <select id="filter-wilayah" class="p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"></select>
                <select id="filter-apo" class="p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold"></select>
                <select id="filter-shipment" class="p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"></select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div id="loading-state" class="hidden py-16 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent mb-3"></div>
                <p class="text-gray-400 text-sm font-bold italic">Menghubungkan ke GSheet...</p>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            <th class="px-6 py-4">Toko / Wilayah</th>
                            <th class="px-6 py-4">Penerima</th>
                            <th class="px-6 py-4">ID Pengiriman</th>
                            <th class="px-6 py-4 text-center">Status APO</th>
                            <th class="px-6 py-4">Shipment</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-gray-50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
