<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot-green {
            height: 10px; width: 10px; background-color: #22c55e;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px #22c55e;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black uppercase italic">Monitoring <span class="text-blue-600">Midikriing</span></h1>
                <p id="gsheet-update" class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-tighter italic">Menghubungkan...</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="dot-green"></span>
                <span class="text-[10px] font-black uppercase text-green-600 italic">Server Active</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
            <input type="text" id="search-input" placeholder="Cari Nama/Toko..." class="p-3 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <select id="filter-wilayah" class="p-3 rounded-xl border border-slate-200 bg-white text-sm"></select>
            <select id="filter-apo" class="p-3 rounded-xl border border-slate-200 bg-white text-sm"></select>
            <select id="filter-shipment" class="p-3 rounded-xl border border-slate-200 bg-white text-sm"></select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-6 py-4">Toko / Wilayah</th>
                            <th class="px-6 py-4">Penerima</th>
                            <th class="px-6 py-4 text-center">No Pengiriman</th>
                            <th class="px-6 py-4 text-center">Status APO</th>
                            <th class="px-6 py-4">Status Shipment</th>
                            <th class="px-6 py-4 text-center">SLA</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100 text-[11px] italic">
                        <tr><td colspan="6" class="p-20 text-center text-slate-300 font-bold animate-pulse">SINKRONISASI DATA...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
