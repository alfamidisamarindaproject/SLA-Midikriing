<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="relative group">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
        <input type="text" id="search-input" placeholder="Cari No / Nama / Toko..." 
            class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-none shadow-sm focus:ring-4 focus:ring-blue-500/10 outline-none text-sm transition-all font-semibold bg-white">
    </div>

    <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500">
            <i class="fa-solid fa-location-dot text-sm"></i>
        </div>
        <select id="filter-wilayah" class="w-full pl-10 pr-10 py-3.5 rounded-2xl border-none shadow-sm focus:ring-4 focus:ring-blue-500/10 text-sm font-semibold cursor-pointer appearance-none bg-white italic"></select>
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-300">
            <i class="fa-solid fa-chevron-down text-[10px]"></i>
        </div>
    </div>

    <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-orange-500">
            <i class="fa-solid fa-box-open text-sm"></i>
        </div>
        <select id="filter-apo" class="w-full pl-10 pr-10 py-3.5 rounded-2xl border-none shadow-sm focus:ring-4 focus:ring-blue-500/10 text-sm font-semibold cursor-pointer appearance-none bg-white italic"></select>
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-300">
            <i class="fa-solid fa-chevron-down text-[10px]"></i>
        </div>
    </div>

    <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-emerald-500">
            <i class="fa-solid fa-truck-fast text-sm"></i>
        </div>
        <select id="filter-shipment" class="w-full pl-10 pr-10 py-3.5 rounded-2xl border-none shadow-sm focus:ring-4 focus:ring-blue-500/10 text-sm font-semibold cursor-pointer appearance-none bg-white italic"></select>
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-300">
            <i class="fa-solid fa-chevron-down text-[10px]"></i>
        </div>
    </div>
</div>
