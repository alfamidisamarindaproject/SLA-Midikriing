<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-slate-800 italic uppercase">Monitoring <span class="text-blue-600">Midikriing</span></h1>
                <div class="flex items-center mt-1">
                    <span class="relative flex h-2 w-2 mr-2">
                        <span id="ping-indicator" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span id="dot-indicator" class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    <p id="gsheet-update" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest italic">Inisialisasi Server...</p>
                </div>
            </div>
            <div class="text-right hidden md:block">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">System Status</p>
                <p id="status-text" class="text-xs font-bold text-slate-700 uppercase">Checking...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-slate-400">
                <p class="text-[9px] font-black text-slate-400 uppercase">Total Pending</p>
                <h2 id="stat-total" class="text-2xl font-black text-gray-800">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-red-500">
                <div class="flex justify-between items-center mb-1">
                    <p class="text-[9px] font-black text-red-500 uppercase">NEW</p>
                    <span id="perc-new" class="text-[10px] font-bold text-red-400 bg-red-50 px-1 rounded">0%</span>
                </div>
                <h2 id="stat-new" class="text-2xl font-black text-red-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-500">
                <div class="flex justify-between items-center mb-1">
                    <p class="text-[9px] font-black text-orange-500 uppercase">PROSES</p>
                    <span id="perc-proses" class="text-[10px] font-bold text-orange-400 bg-orange-50 px-1 rounded">0%</span>
                </div>
                <h2 id="stat-proses" class="text-2xl font-black text-orange-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-emerald-500">
                <div class="flex justify-between items-center mb-1">
                    <p class="text-[9px] font-black text-emerald-500 uppercase">PACKING</p>
                    <span id="perc-packing" class="text-[10px] font-bold text-emerald-400 bg-emerald-50 px-1 rounded">0%</span>
                </div>
                <h2 id="stat-packing" class="text-2xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-600 col-span-2 md:col-span-1">
                <p class="text-[9px] font-black text-blue-600 uppercase">Revenue</p>
                <h2 id="stat-revenue" class="text-xl font-black text-gray-800 text-sm">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
            <input type="text" id="search-input" placeholder="Cari Nama/No..." class="p-2.5 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm">
            <select id="filter-wilayah" class="p-2.5 rounded-xl border border-slate-200 bg-white text-sm shadow-sm"></select>
            <select id="filter-apo" class="p-2.5 rounded-xl border border-slate-200 bg-white text-sm shadow-sm"></select>
            <select id="filter-shipment" class="p-2.5 rounded-xl border border-slate-200 bg-white text-sm shadow-sm"></select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <th class="px-6 py-4">Toko / Wilayah</th>
                            <th class="px-6 py-4">Penerima</th>
                            <th class="px-6 py-4 text-center">No Pengiriman</th>
                            <th class="px-6 py-4 text-center">Status APO</th>
                            <th class="px-6 py-4">Status Shipment</th>
                            <th class="px-6 py-4 text-center">SLA</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100">
                        <tr><td colspan="7" class="p-20 text-center font-bold text-slate-300 animate-pulse uppercase tracking-widest">Menunggu Sinkronisasi Data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
